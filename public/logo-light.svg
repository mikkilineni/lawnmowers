<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" role="img" aria-label="Lawnmowers.com">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;display=swap');
    </style>
  </defs>

  <!-- Icon: rounded square -->
  <rect x="0" y="4" width="56" height="56" rx="11" fill="#5a9e2f"/>

  <!-- Grass blades -->
  <rect x="9"  y="14" width="3" height="7"  rx="1.5" fill="#a8d832"/>
  <rect x="15" y="12" width="3" height="9"  rx="1.5" fill="#a8d832"/>
  <rect x="21" y="13" width="3" height="8"  rx="1.5" fill="#a8d832"/>
  <rect x="27" y="12" width="3" height="9"  rx="1.5" fill="#a8d832"/>
  <rect x="33" y="14" width="3" height="7"  rx="1.5" fill="#a8d832"/>

  <!-- Mower body -->
  <rect x="7" y="20" width="32" height="11" rx="3" fill="white"/>

  <!-- Left wheel -->
  <circle cx="13" cy="36" r="6"   fill="white"/>
  <circle cx="13" cy="36" r="2.4" fill="#5a9e2f"/>

  <!-- Right wheel -->
  <circle cx="34" cy="36" r="6"   fill="white"/>
  <circle cx="34" cy="36" r="2.4" fill="#5a9e2f"/>

  <!-- Handle -->
  <line x1="39" y1="26" x2="52" y2="10" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text
    x="70" y="47"
    font-family="'Bebas Neue', 'Arial Black', Arial, sans-serif"
    font-size="38"
    letter-spacing="1"
  >
    <tspan fill="#3a7a1a">Lawn</tspan><tspan fill="#1c2e0e">mowers</tspan><tspan fill="#5a9e2f" font-size="28" dy="4">.com</tspan>
  </text>
</svg>
