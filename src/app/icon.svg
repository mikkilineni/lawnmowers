<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#5a9e2f"/>

  <!-- Grass blades -->
  <rect x="10" y="22" width="3" height="7" rx="1.5" fill="#8fce50"/>
  <rect x="17" y="20" width="3" height="9" rx="1.5" fill="#8fce50"/>
  <rect x="24" y="21" width="3" height="8" rx="1.5" fill="#8fce50"/>
  <rect x="31" y="20" width="3" height="9" rx="1.5" fill="#8fce50"/>

  <!-- Mower body -->
